name: Backend Quality Control

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./...
        working-directory: backend

  tests:
    name: Run tests
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Unit Tests
        working-directory: ./backend
        run: go test -v -short -coverprofile=unit.out -covermode=atomic ./internal/...

      - name: Run Integration Tests
        working-directory: ./backend
        run: go test -v -tags=integration -coverprofile=integration.out ./internal/adapter/...

      - name: Merge Coverage Profiles
        working-directory: ./backend
        run: |
          cat unit.out > coverage.txt
          grep -v "mode:" integration.out >> coverage.txt

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: backend/coverage.txt

      - name: Run E2E Tests
        working-directory: ./backend/tests/e2e
        run: go test -v -tags=e2e

  code_coverage:
    name: "Code coverage report"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Report Coverage
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage.txt"
          root-package: "github.com/${{ github.repository }}/backend"