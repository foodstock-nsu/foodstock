name: Backend Quality Control

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./...
        working-directory: backend

  tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache-dependency-path: backend/go.sum

      - name: Run Unit Tests
        working-directory: ./backend
        run: go test -v -short ./internal/...

      - name: Run Integration Tests
        working-directory: ./backend
        run: go test -v -tags=integration ./internal/adapter/...

      - name: Run E2E Tests
        working-directory: ./backend/tests/e2e
        run: go test -v -tags=e2e