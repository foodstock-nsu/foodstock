name: foodstock

services:
  foodstock-db:
    image: postgres:15-alpine
    container_name: foodstock-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - foodstock_db_data:/var/lib/postgresql/data

  foodstock-migrations:
    image: migrate/migrate:latest
    container_name: foodstock-migrations
    volumes:
      - ./backend/migrations:/migrations
    command:
      - -path=/migrations/
      - -database=postgres://${DB_USER}:${DB_PASSWORD}@foodstock-db:5432/${DB_NAME}?sslmode=disable
      - up
    depends_on:
      foodstock-db:
        condition: service_healthy

  foodstock-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodstock-server
    depends_on:
      foodstock-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DB_HOST=foodstock-db
    ports:
      - "${HTTP_PORT}:8080"

  foodstock-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodstock-frontend
    depends_on:
      foodstock-server:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  foodstock_db_data:
