name: foodstock-test

services:
  foodstock-test-db:
    image: postgres:15-alpine
    container_name: foodstock-test-db
    environment:
      - POSTGRES_USER=${TEST_DB_USER}
      - POSTGRES_PASSWORD=${TEST_DB_PASSWORD}
      - POSTGRES_DB=${TEST_DB_NAME}
    ports:
      - "${TEST_DB_PORT}:5432"
