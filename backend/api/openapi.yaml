openapi: 3.0.3

info:
  title: FoodStock API
  description: Приложение для микромаркетов "на доверии"
  version: 1.0.0

tags:
  - name: System
  - name: Client
  - name: Webhooks
  - name: Admin Auth
  - name: Admin Locations
  - name: Admin Inventory
  - name: Admin Items

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LocationIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор торговой точки
    ItemIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор товара

  schemas:
    SystemInfoResponse:
      type: object
      properties:
        app:
          type: string
          example: "foodstock-api"
        environment:
          type: string
          example: "production"
        uptime:
          type: string
          example: "45h12m3s"
        api_version:
          type: string
          example: "v1"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "something went wrong"

    AdminAuthRequest:
      type: object
      properties:
        login:
          type: string
          example: "maket"
        password:
          type: string
          example: "maket123"
    AdminAuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    CatalogItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        name:
          type: string
          example: "Сэндвич с курицей"
        description:
          type: string
          nullable: true
          example: "Сэндвич с курицей и соусом тар-тар"
        category:
          type: string
          example: "breakfast"
        photo_url:
          type: string
          example: "https://photos-storage/exsa129csa7690/chicken_sandwich.png"
        nutrition:
          $ref: "#/components/schemas/NutritionResponse"
        price:
          type: integer
          format: int64
          description: "Цена в копейках. 10050 = 100 руб. 50 коп."
          example: 10050
        is_available:
          type: boolean
          description: "Наличие товара на торговой точке"
        stock_amount:
          type: integer
          description: "Количество товара на торговой точке"
          example: 10

    GetCatalogResponse:
      type: object
      properties:
        categories:
          type: array
          description: "Список доступных категорий товаров"
          items:
            type: string
          example: [ "lunch", "drinks", "snacks", "breakfast" ]
        items:
          type: array
          description: "Список всех товаров"
          items:
            $ref: "#/components/schemas/CatalogItemResponse"

    OrderItemRequest:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        amount:
          type: integer
          description: "Количество единиц товара"
          example: 5
        price:
          type: integer
          format: int64
          description: "Цена в копейках за ОДНУ единицу товара. 10050 = 100 руб. 50 коп."
          example: 10050

    CreateOrderRequest:
      type: object
      properties:
        location_id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        items:
          type: array
          description: "Список товаров заказа"
          items:
            $ref: "#/components/schemas/OrderItemRequest"
    CreateOrderResponse:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        total_price:
          type: integer
          format: int64
          description: "Общая сумма заказа в копейках. 10050 = 100 руб. 50 коп."
          example: 10050
        payment_url:
          type: string
          format: uri
          description: "Сгенерированная ссылка на оплату"
          example: "https://yoomoney.ru/checkout/payments/v2/contract?orderId=250270ad-000f-5000-8000-117600"

    LocationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        slug:
          type: string
          example: "nsu_1"
        name:
          type: string
          example: "Холодильник в главном корпусе НГУ"
        address:
          type: string
          example: "Новосибирск, ул. Пирогова, д.1"
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    CreateLocationRequest:
      type: object
      properties:
        slug:
          type: string
          example: "nsu_1"
        name:
          type: string
          example: "Холодильник в главном корпусе НГУ"
        address:
          type: string
          example: "Новосибирск, ул. Пирогова, д.1"
    CreateLocationResponse:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/LocationResponse"

    UpdateLocationRequest:
      type: object
      properties:
        slug:
          type: string
          nullable: true
          example: "nsu_1"
        name:
          type: string
          nullable: true
          example: "Холодильник в главном корпусе НГУ"
        address:
          type: string
          nullable: true
          example: "Новосибирск, ул. Пирогова, д.1"
        is_active:
          type: boolean
          nullable: true
          example: true
    UpdateLocationResponse:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/LocationResponse"

    ListLocationsResponse:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationResponse"

    NutritionResponse:
      type: object
      nullable: true
      description: "Калории и БЖУ"
      properties:
        calories:
          type: integer
          nullable: true
          example: 200
        proteins:
          type: number
          format: float
          nullable: true
          example: 23.6
        fats:
          type: number
          format: float
          nullable: true
          example: 1.9
        carbs:
          type: number
          format: float
          nullable: true
          example: 0.3

    ItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Сэндвич с курицей"
        description:
          type: string
          nullable: true
          example: "Сэндвич с курицей и соусом тар-тар"
        category:
          type: string
          example: "breakfast"
        photo_url:
          type: string
          example: "https://photos-storage/exsa129csa7690/chicken_sandwich.png"
        nutrition:
          $ref: "#/components/schemas/NutritionResponse"
        created_at:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      properties:
        name:
          type: string
          example: "Сэндвич с курицей"
        description:
          type: string
          nullable: true
          example: "Сэндвич с курицей и соусом тар-тар"
        category:
          type: string
          example: "breakfast"
        photo_url:
          type: string
          example: "https://photos-storage/exsa129csa7690/chicken_sandwich.png"
        nutrition:
          $ref: "#/components/schemas/NutritionResponse"
    CreateItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/ItemResponse"

    UpdateItemRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          example: "Сэндвич с курицей"
        description:
          type: string
          nullable: true
          example: "Сэндвич с курицей и соусом тар-тар"
        category:
          type: string
          nullable: true
          example: "breakfast"
        photo_url:
          type: string
          nullable: true
          example: "https://photos-storage/exsa129csa7690/chicken_sandwich.png"
        nutrition:
          $ref: "#/components/schemas/NutritionResponse"
    UpdateItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/ItemResponse"

    ListItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemResponse"

    InventoryItemRequest:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        price:
          type: integer
          format: int64
          nullable: true
          description: "Цена в копейках. 10050 = 100 руб. 50 коп."
          example: 10050
        is_available:
          type: boolean
          nullable: true
          description: "Доступность товара на точке"
        stock_amount:
          type: integer
          nullable: true
          description: "Остаток на точке в единицах товара"
          example: 10
    InventoryItemResponse:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
          example: "b3d538c5-3680-5bd1-b784-cebb32b29d6c"
        price:
          type: integer
          format: int64
          description: "Цена в копейках. 10050 = 100 руб. 50 коп."
          example: 10050
        is_available:
          type: boolean
          description: "Доступность товара на точке"
        stock_amount:
          type: integer
          description: "Остаток на точке в единицах товара"
          example: 10

    GetInventoryResponse:
      type: object
      properties:
        inventory:
          type: array
          description: "Список товаров на точке"
          items:
            $ref: "#/components/schemas/InventoryItemResponse"

    UpdateInventoryRequest:
      type: object
      properties:
        inventory:
          type: array
          description: "Список товаров с указанием полей для обновления"
          items:
            $ref: "#/components/schemas/InventoryItemRequest"
    UpdateInventoryResponse:
      type: object
      properties:
        inventory:
          type: array
          description: "Список обновлённых товаров на точке"
          items:
            $ref: "#/components/schemas/InventoryItemResponse"

  responses:
    BadRequestError:
      description: Ошибка в формате запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "invalid json"

    UnauthorizedError:
      description: Ошибка авторизации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_header:
              summary: Отсутствует заголовок
              value:
                error: "missing auth header"
            invalid_token:
              summary: Невалидный или просроченный токен
              value:
                error: "invalid or expired token"

    LocationNotFoundError:
      description: Торговая точка не найдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "location not found"
    ItemNotFoundError:
      description: Товар не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "item not found"
    LocationItemNotFoundError:
      description: Товар на точке не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "location item not found"

    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "internal error"

paths:
  /health:
    get:
      tags: [ System ]
      summary: Проверка работоспособности
      responses:
        '200':
          description: Сервис жив

  /_info:
    get:
      tags: [ System ]
      summary: Информация о сборке
      description: Возвращает версию API и текущее окружение.
      responses:
        '200':
          description: Данные о системе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfoResponse'

  /api/v1/client/locations/{id}/catalog:
    get:
      tags: [ Client ]
      summary: Получить каталог товаров
      description: Возвращает каталог товаров на торговой точке и список категорий
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '200':
          description: Возвращает каталог товаров на торговой точке и список категорий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCatalogResponse'
        '400':
          description: Некорректный идентификатор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid identifier format"
        '500':
          $ref: "#/components/responses/InternalError"

  /api/v1/client/orders:
    post:
      tags: [ Client ]
      summary: Создать заказ и получить ссылку на оплату
      description: Возвращает идентификатор заказа, итоговую сумму в копейках и ссылку на оплату
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_location_id:
                  summary: Некорректный идентификатор торговой точки
                  value:
                    error: "invalid input"
                incorrect_items:
                  summary: Некорректный массив товаров (пустой или содержит невалидные объекты)
                  value:
                    error: "invalid input"
        '404':
          description: Ресурс не найден (торговая точка или конкретный товар)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                location_not_found:
                  summary: Торговая точка не найдена
                  value:
                    error: "location not found"
                location_item_not_found:
                  summary: Товар на точке не найден
                  value:
                    error: "location item not found"
        '409':
          description: Конфликт при создании заказа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                order_exists:
                  summary: Заказ уже существует
                  value:
                    error: "order already exists"
                cannot_sell:
                  summary: Ошибка валидации товаров (цена/наличие)
                  description: "Возникает, если цена изменилась или товара нет в нужном количестве"
                  value:
                    error: "cannot sell one of the chosen items"
        '422':
          description: Указанная торговая точка не принимает заказы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "cannot create order: location is not operational"
        '500':
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/auth:
    post:
      tags: [ Admin Auth ]
      summary: Авторизация администратора
      description: Возвращает JWT токен доступа при успехе
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAuthRequest'
      responses:
        '200':
          description: Токен успешно выдан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthResponse'
        '400':
          $ref: "#/components/responses/BadRequestError"
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid login or password"
        '500':
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/locations:
    post:
      tags: [ Admin Locations ]
      summary: Создать торговую точку
      description: Создаёт новую торговую точку и возвращает её данные
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Точка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLocationResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_slug:
                  summary: Некорректный slug
                  value:
                    error: "invalid input"
                incorrect_name:
                  summary: Некорректное имя
                  value:
                    error: "invalid input"
                incorrect_address:
                  summary: Некорректный адрес
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Торговая точка уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "location with given slug already exists"
        '500':
          $ref: "#/components/responses/InternalError"
    get:
      tags: [ Admin Locations ]
      summary: Получить список всех торговых точек
      security:
        - BearerAuth: [ ]
      responses:
        '200':
          description: Список всех торговых точек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLocationsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/locations/{id}:
    put:
      tags: [ Admin Locations ]
      summary: Обновить данные торговой точки
      description: Обновляет торговую точку и возвращает её новые данные
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: "Данные торговой точки обновлены"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateLocationResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  summary: Битый JSON
                  value:
                    error: "invalid json"
                incorrect_id:
                  summary: Некорректный идентификатор
                  value:
                    error: "invalid identifier format"
                incorrect_slug:
                  summary: Некорректный slug
                  value:
                    error: "invalid input"
                incorrect_name:
                  summary: Некорректное имя
                  value:
                    error: "invalid input"
                incorrect_address:
                  summary: Некорректный адрес
                  value:
                    error: "invalid input"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/LocationNotFoundError'
#        '409':
#          description: Не удалось изменить статус торговой точки
#          content:
#            application/json:
#              schema:
#                $ref: "#/components/schemas/ErrorResponse"
#              examples:
#                cannot_activate:
#                  summary: Торговая точка уже активирована
#                  value:
#                    error: "location is already activated"
#                cannot_deactivate:
#                  summary: Торговая точка уже деактивирована
#                  value:
#                    error: "location is already deactivated"
        '500':
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [ Admin Locations ]
      summary: Удалить торговую точку
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '204':
          description: "Торговая точка удалена успешно"
        '400':
          description: Некорректный идентификатор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid identifier format"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/LocationNotFoundError'
        '500':
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/locations/{id}/qrcode:
    get:
      tags: [ Admin Locations ]
      summary: Получить QR-код торговой точки
      description: Генерирует и возвращает изображение QR-кода в формате PNG
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '200':
          description: QR-код успешно сгенерирован
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Некорректный идентификатор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid identifier format"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/LocationNotFoundError'
        '422':
          description: QR-код не может быть получен, так как торговая точка неактивна
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "location is not operational"
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/locations/{id}/inventory:
    get:
      tags: [ Admin Inventory ]
      summary: Получить инвентарь торговой точки
      security:
        - BearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '200':
          description: Текущие остатки на точке
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInventoryResponse'
        '400':
          description: Некорректный идентификатор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid identifier format"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
